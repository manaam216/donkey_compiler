name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    name: Build and test
    runs-on: windows-latest

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW32
          update: true
          install: >-
            make
            gawk
            mingw-w64-i686-gcc

      - name: Build
        run: make

      - name: Test
        run: make test
